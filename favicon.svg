<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Webamp PWA">
  <defs>
    <clipPath id="rounded"><rect width="512" height="512" rx="108"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3050"/>
      <stop offset="0.5" stop-color="#f0b400"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- CRT scanlines -->
    <g opacity="0.06" fill="#39ff14">
      <rect y="20"  width="512" height="2"/>
      <rect y="60"  width="512" height="2"/>
      <rect y="100" width="512" height="2"/>
      <rect y="140" width="512" height="2"/>
      <rect y="180" width="512" height="2"/>
      <rect y="220" width="512" height="2"/>
      <rect y="260" width="512" height="2"/>
      <rect y="300" width="512" height="2"/>
      <rect y="340" width="512" height="2"/>
      <rect y="380" width="512" height="2"/>
      <rect y="420" width="512" height="2"/>
      <rect y="460" width="512" height="2"/>
    </g>

    <!-- LCD-style equalizer bars: 7 segmented vertical bars.
         Bar slot: 44 wide, gap 8. Total width = 7*44 + 6*8 = 356.
         Centered horizontally: left = (512-356)/2 = 78
         Vertical center band: y range 110..408 (height 298). -->
    <!-- Heights chosen for nice "music" shape: low-mid-high-mid-high-low-mid -->

    <!-- bar 1, 4 segments -->
    <g transform="translate(78,0)">
      <g fill="url(#barA)">
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="248" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 2, 6 segments -->
    <g transform="translate(130,0)">
      <g fill="url(#barA)">
        <rect x="0" y="168" width="44" height="32"/>
        <rect x="0" y="208" width="44" height="32"/>
        <rect x="0" y="248" width="44" height="32"/>
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="128" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 3, 5 segments -->
    <g transform="translate(182,0)">
      <g fill="url(#barA)">
        <rect x="0" y="208" width="44" height="32"/>
        <rect x="0" y="248" width="44" height="32"/>
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="168" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 4, 7 segments (tallest) -->
    <g transform="translate(234,0)">
      <g fill="url(#barA)">
        <rect x="0" y="128" width="44" height="32"/>
        <rect x="0" y="168" width="44" height="32"/>
        <rect x="0" y="208" width="44" height="32"/>
        <rect x="0" y="248" width="44" height="32"/>
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="88" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 5, 5 segments -->
    <g transform="translate(286,0)">
      <g fill="url(#barA)">
        <rect x="0" y="208" width="44" height="32"/>
        <rect x="0" y="248" width="44" height="32"/>
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="168" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 6, 3 segments -->
    <g transform="translate(338,0)">
      <g fill="url(#barA)">
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="288" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- bar 7, 6 segments -->
    <g transform="translate(390,0)">
      <g fill="url(#barA)">
        <rect x="0" y="168" width="44" height="32"/>
        <rect x="0" y="208" width="44" height="32"/>
        <rect x="0" y="248" width="44" height="32"/>
        <rect x="0" y="288" width="44" height="32"/>
        <rect x="0" y="328" width="44" height="32"/>
        <rect x="0" y="368" width="44" height="32"/>
      </g>
      <rect x="0" y="128" width="44" height="32" fill="url(#barB)"/>
    </g>

    <!-- Subtle bottom plate -->
    <rect x="60" y="412" width="392" height="6" rx="3" fill="#39ff14" opacity="0.4"/>
  </g>
</svg>
